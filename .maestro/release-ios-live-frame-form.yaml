appId: dev.noscrubs.expoturbo.example
---
- launchApp:
    clearState: true
- openLink: expoturboexample://live-frame-form
- extendedWaitUntil:
    visible: Standalone Rails Frame form
    timeout: 120000
- extendedWaitUntil:
    visible:
      id: demo-form-input-id-demo-form-first-name
    timeout: 120000
- tapOn:
    id: demo-form-input-id-demo-form-first-name
- inputText: invalid release
- hideKeyboard
- tapOn: Save first name
- extendedWaitUntil:
    visible: This demo name is unavailable
    timeout: 30000
- tapOn:
    id: demo-form-input-id-demo-form-first-name
- eraseText
- inputText: Ada
- hideKeyboard
- tapOn: Complete without replacing Frame
- extendedWaitUntil:
    visible: This demo name is unavailable
    timeout: 30000
- tapOn: Save first name
- extendedWaitUntil:
    notVisible: This demo name is unavailable
    timeout: 30000
- assertVisible: Rails Frame form

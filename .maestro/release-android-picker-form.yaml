appId: dev.noscrubs.expoturbo.example
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: Expo Turbo
    timeout: 120000
- scrollUntilVisible:
    element:
      text: First name
    direction: DOWN
    timeout: 60000
- tapOn: Ada
- hideKeyboard
- scrollUntilVisible:
    element:
      text: Choose a text file
    direction: DOWN
    timeout: 240000
    speed: 40
    visibilityPercentage: 20
- tapOn: Choose a text file
- extendedWaitUntil:
    visible: Recent
    timeout: 30000
- tapOn: expo-turbo-android-picked.txt
- scrollUntilVisible:
    element:
      text: "Selected: expo-turbo-android-picked.txt"
    direction: DOWN
    timeout: 30000
- scrollUntilVisible:
    element:
      text: Validate selected attachment (return 422)
    direction: DOWN
    timeout: 60000
- tapOn: Validate selected attachment (return 422)
- extendedWaitUntil:
    visible: Retry this selected attachment
    timeout: 30000
- assertVisible: "Selected: expo-turbo-android-picked.txt"

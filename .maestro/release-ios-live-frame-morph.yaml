appId: dev.noscrubs.expoturbo.example
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: Expo Turbo
    timeout: 120000
- scrollUntilVisible:
    element:
      text: Nested Frame refresh morph
    direction: DOWN
    timeout: 120000
- scrollUntilVisible:
    element:
      text: Visit outer Frame with morph renderer
    direction: DOWN
    timeout: 30000
- hideKeyboard
- waitForAnimationToEnd
- scrollUntilVisible:
    element:
      text: Visit outer Frame with morph renderer
    direction: DOWN
    timeout: 30000
- tapOn: Visit outer Frame with morph renderer
- scrollUntilVisible:
    element:
      text: Outer Frame response
    direction: UP
    timeout: 30000
- scrollUntilVisible:
    element:
      text: Inner Frame response
    direction: DOWN
    timeout: 30000

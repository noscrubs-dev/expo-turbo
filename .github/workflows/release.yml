name: Release

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Build a non-publishing candidate or publish an approved frozen candidate
        required: true
        default: candidate
        type: choice
        options:
          - candidate
          - publish
      candidate_run_id:
        description: Successful Release candidate workflow run ID required for stable publication
        required: false
        type: string

permissions:
  contents: read

jobs:
  admission:
    name: Candidate admission
    if: ${{ inputs.operation == 'candidate' }}
    runs-on: ubuntu-latest
    steps:
      - name: Require the merged main branch
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = "refs/heads/main"

  typescript-artifact:
    name: TypeScript artifact
    if: ${{ inputs.operation == 'candidate' }}
    needs: admission
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - name: Pack and install the exact npm artifact in a clean Bun consumer
        shell: bash
        run: |
          set -euo pipefail
          package_version="$(node -p 'require("./package.json").version')"
          bun pm pack
          tarball="expo-turbo-${package_version}.tgz"
          test -f "$tarball"

          consumer="$(mktemp -d)"
          cd "$consumer"
          npm init --yes >/dev/null
          npm install --ignore-scripts "$GITHUB_WORKSPACE/$tarball"
          EXPECTED_VERSION="$package_version" bun --eval '
            import { EXPO_TURBO_RUNTIME_VERSION } from "expo-turbo";
            if (EXPO_TURBO_RUNTIME_VERSION !== process.env.EXPECTED_VERSION) {
              throw new Error("artifact version mismatch");
            }
          '
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-tarball
          path: expo-turbo-*.tgz
          if-no-files-found: error
          retention-days: 30

  ruby-gem:
    name: Ruby gem (${{ matrix.turbo_rails }})
    if: ${{ inputs.operation == 'candidate' }}
    needs: admission
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - turbo_rails: 2.0.10
            gemfile: turbo_rails_2.0.10.gemfile
          - turbo_rails: 2.0.23
            gemfile: turbo_rails_2.0.23.gemfile
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/rails/gemfiles/${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: true
      - run: bundle exec ruby -e 'abort unless Gem.loaded_specs.fetch("turbo-rails").version.to_s == "${{ matrix.turbo_rails }}"'
        working-directory: rails
      - run: bundle exec ruby "$(bundle show rake)/exe/rake"
        working-directory: rails
      - run: bundle exec ruby "$(bundle show rake)/exe/rake" build
        working-directory: rails
      - name: Install the exact gem artifact in a clean consumer
        shell: bash
        run: |
          set -euo pipefail
          gem_version="$(ruby -Irails/lib -rexpo_turbo/rails/version -e 'print ExpoTurbo::Rails::VERSION')"
          gem_file="$GITHUB_WORKSPACE/rails/pkg/expo_turbo-rails-${gem_version}.gem"
          test -f "$gem_file"

          consumer="$(mktemp -d)"
          mkdir -p "$consumer/gems"
          cp "$gem_file" "$consumer/gems/"
          gem generate_index --directory "$consumer" >/dev/null
          cat >"$consumer/Gemfile" <<RUBY
          source "https://rubygems.org"

          gem "turbo-rails", "${{ matrix.turbo_rails }}"

          source "file://${consumer}" do
            gem "expo_turbo-rails", "${gem_version}"
          end
          RUBY
          (
            cd "$consumer"
            BUNDLE_GEMFILE=Gemfile bundle config set --local path "$consumer/vendor/bundle"
            BUNDLE_GEMFILE=Gemfile bundle install
            BUNDLE_GEMFILE=Gemfile bundle exec ruby -e '
              require "action_controller/railtie"
              require "action_view/railtie"
              require "expo_turbo/rails"
              abort "artifact version mismatch" unless ExpoTurbo::Rails::VERSION == ARGV.fetch(0)
            ' "$gem_version"
          )
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: matrix.turbo_rails == '2.0.23'
        with:
          name: ruby-gem
          path: rails/pkg/expo_turbo-rails-*.gem
          if-no-files-found: error
          retention-days: 30

  expo-example:
    name: Expo example
    if: ${{ inputs.operation == 'candidate' }}
    needs: admission
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun install --frozen-lockfile
        working-directory: example/expo
      - run: bun run check
        working-directory: example/expo
      - run: bunx expo-doctor
        working-directory: example/expo

  rails-example:
    name: Rails example
    if: ${{ inputs.operation == 'candidate' }}
    needs: admission
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/example/rails/Gemfile
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: true
      - run: bundle exec standardrb
        working-directory: example/rails
      - run: bundle exec rspec
        working-directory: example/rails

  manifest:
    name: Candidate manifest
    if: ${{ inputs.operation == 'candidate' }}
    needs: [typescript-artifact, ruby-gem, expo-example, rails-example]
    runs-on: ubuntu-latest
    environment: release
    permissions:
      attestations: write
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "3.3.8"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Verify GitHub OIDC identity claims without exposing a token
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const audience = "https://expo-turbo.invalid/release-candidate"
          const url = new URL(process.env.ACTIONS_ID_TOKEN_REQUEST_URL)
          url.searchParams.set("audience", audience)
          const response = await fetch(url, {
            headers: { Authorization: `Bearer ${process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN}` },
          })
          if (!response.ok) throw new Error(`OIDC token request failed: ${response.status}`)
          const { value } = await response.json()
          const [, payload] = value.split(".")
          const claim = JSON.parse(Buffer.from(payload, "base64url").toString("utf8"))
          if (
            claim.aud !== audience ||
            claim.repository !== process.env.GITHUB_REPOSITORY ||
            claim.ref !== "refs/heads/main" ||
            claim.environment !== "release"
          ) {
            throw new Error("OIDC token did not bind the expected repository, main ref, and release environment")
          }
          console.log(`Verified OIDC identity: ${claim.repository} ${claim.ref} environment:${claim.environment}`)
          NODE
      - name: Record the paired artifact manifest
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p 'require("./package.json").name')"
          package_version="$(node -p 'require("./package.json").version')"
          gem_name="$(ruby -e 'spec = Gem::Specification.load("rails/expo_turbo-rails.gemspec"); print spec.name')"
          gem_version="$(ruby -Irails/lib -rexpo_turbo/rails/version -e 'print ExpoTurbo::Rails::VERSION')"
          test "$package_version" = "$gem_version"
          export package_name package_version gem_name gem_version
          node --input-type=module <<'NODE'
          import { createHash } from "node:crypto"
          import { readdirSync, readFileSync, writeFileSync } from "node:fs"
          import { join } from "node:path"

          const artifact = (directory, suffix) => {
            const files = readdirSync(directory).filter((file) => file.endsWith(suffix))
            if (files.length !== 1) throw new Error(`expected one ${suffix} artifact in ${directory}`)
            return join(directory, files[0])
          }
          const checksum = (file) => createHash("sha256").update(readFileSync(file)).digest("hex")
          const npm = artifact("artifacts/npm-tarball", ".tgz")
          const gem = artifact("artifacts/ruby-gem", ".gem")
          const manifest = {
            commit: process.env.GITHUB_SHA,
            repository: process.env.GITHUB_REPOSITORY,
            workflowRunId: Number(process.env.GITHUB_RUN_ID),
            package: { name: process.env.package_name, version: process.env.package_version },
            gem: { name: process.env.gem_name, version: process.env.gem_version },
            packageVersion: process.env.package_version,
            gemVersion: process.env.gem_version,
            artifacts: [
              { file: npm, sha256: checksum(npm) },
              { file: gem, sha256: checksum(gem) },
            ],
          }
          writeFileSync("release-candidate.json", `${JSON.stringify(manifest, null, 2)}\n`)
          writeFileSync(
            "SHA256SUMS",
            manifest.artifacts.map(({ file, sha256 }) => `${sha256}  ${file}`).join("\n") + "\n",
          )
          NODE
      - name: Sign the paired artifact provenance
        id: provenance
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-checksums: SHA256SUMS
      - name: Preserve the offline provenance bundle
        shell: bash
        env:
          PROVENANCE_BUNDLE: ${{ steps.provenance.outputs.bundle-path }}
        run: cp "$PROVENANCE_BUNDLE" provenance.jsonl
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-candidate
          path: |
            artifacts/npm-tarball/*.tgz
            artifacts/ruby-gem/*.gem
            release-candidate.json
            SHA256SUMS
            provenance.jsonl
          if-no-files-found: error
          retention-days: 30

  stable-publication:
    name: Stable publication
    if: ${{ inputs.operation == 'publish' }}
    runs-on: ubuntu-latest
    environment: release
    permissions:
      actions: read
      contents: write
      id-token: write
    steps:
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          package-manager-cache: false
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1
        with:
          ruby-version: "3.3.8"
      - name: Verify the successful candidate run belongs to this main commit
        shell: bash
        env:
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const candidateRunId = Number(process.env.CANDIDATE_RUN_ID)
          if (!Number.isSafeInteger(candidateRunId) || candidateRunId < 1) {
            throw new Error("A positive candidate_run_id is required for stable publication")
          }
          const response = await fetch(
            `${process.env.GITHUB_API_URL}/repos/${process.env.GITHUB_REPOSITORY}/actions/runs/${candidateRunId}`,
            {
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
              },
            },
          )
          if (!response.ok) throw new Error(`Candidate run lookup failed: ${response.status}`)
          const run = await response.json()
          if (
            run.conclusion !== "success" ||
            run.event !== "workflow_dispatch" ||
            run.head_branch !== "main" ||
            run.head_sha !== process.env.GITHUB_SHA ||
            run.path !== ".github/workflows/release.yml"
          ) {
            throw new Error("Candidate run is not a successful release.yml run for this exact main commit")
          }
          NODE
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.candidate_run_id }}
          name: release-candidate
          path: release-candidate
      - name: Verify the frozen pair and expose only validated artifact paths
        shell: bash
        env:
          CANDIDATE_RUN_ID: ${{ inputs.candidate_run_id }}
        run: |
          set -euo pipefail
          (
            cd release-candidate
            sha256sum --check SHA256SUMS
          )
          node <<'NODE'
          import { appendFileSync, existsSync, readFileSync } from "node:fs"
          import { join } from "node:path"

          const manifest = JSON.parse(readFileSync("release-candidate/release-candidate.json", "utf8"))
          const candidateRunId = Number(process.env.CANDIDATE_RUN_ID)
          const expectedRepository = process.env.GITHUB_REPOSITORY
          const expectedCommit = process.env.GITHUB_SHA
          const packageName = manifest.package?.name
          const packageVersion = manifest.package?.version
          const gemName = manifest.gem?.name
          const gemVersion = manifest.gem?.version
          if (
            manifest.repository !== expectedRepository ||
            manifest.workflowRunId !== candidateRunId ||
            manifest.commit !== expectedCommit ||
            packageName !== "expo-turbo" ||
            gemName !== "expo_turbo-rails" ||
            packageVersion !== gemVersion ||
            packageVersion !== manifest.packageVersion ||
            gemVersion !== manifest.gemVersion ||
            !/^[0-9]+\.[0-9]+\.[0-9]+(?:-[0-9A-Za-z.-]+)?$/.test(packageVersion)
          ) {
            throw new Error("Candidate manifest does not describe this exact Expo Turbo release")
          }
          const npmArtifact = join("release-candidate", "artifacts/npm-tarball", `${packageName}-${packageVersion}.tgz`)
          const gemArtifact = join("release-candidate", "artifacts/ruby-gem", `${gemName}-${gemVersion}.gem`)
          const expectedArtifacts = new Set([npmArtifact.slice("release-candidate/".length), gemArtifact.slice("release-candidate/".length)])
          if (
            !Array.isArray(manifest.artifacts) ||
            manifest.artifacts.length !== 2 ||
            manifest.artifacts.some(({ file, sha256 }) => !expectedArtifacts.has(file) || !/^[a-f0-9]{64}$/.test(sha256)) ||
            !existsSync(npmArtifact) ||
            !existsSync(gemArtifact)
          ) {
            throw new Error("Candidate artifacts do not match the manifest")
          }
          appendFileSync(
            process.env.GITHUB_ENV,
            [
              `NPM_ARTIFACT=${npmArtifact}`,
              `GEM_ARTIFACT=${gemArtifact}`,
              `NPM_NAME=${packageName}`,
              `GEM_NAME=${gemName}`,
              `PACKAGE_VERSION=${packageVersion}`,
              `GEM_VERSION=${gemVersion}`,
              `RELEASE_TAG=v${packageVersion}`,
            ].join("\n") + "\n",
          )
          NODE
      - name: Verify the frozen artifact provenance
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh attestation verify "$NPM_ARTIFACT" \
            --bundle release-candidate/provenance.jsonl \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
            --source-digest "$GITHUB_SHA" \
            --source-ref refs/heads/main
          gh attestation verify "$GEM_ARTIFACT" \
            --bundle release-candidate/provenance.jsonl \
            --repo "$GITHUB_REPOSITORY" \
            --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/release.yml" \
            --source-digest "$GITHUB_SHA" \
            --source-ref refs/heads/main
      - name: Require both exact versions to be unpublished
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const npmResponse = await fetch(
            `https://registry.npmjs.org/${encodeURIComponent(process.env.NPM_NAME)}/${encodeURIComponent(process.env.PACKAGE_VERSION)}`,
          )
          if (npmResponse.status !== 404) {
            throw new Error(`npm ${process.env.NPM_NAME}@${process.env.PACKAGE_VERSION} is already present or unavailable: ${npmResponse.status}`)
          }
          const gemResponse = await fetch(
            `https://rubygems.org/api/v1/versions/${encodeURIComponent(process.env.GEM_NAME)}.json`,
          )
          if (gemResponse.status !== 404) {
            if (!gemResponse.ok) {
              throw new Error(`RubyGems version lookup failed: ${gemResponse.status}`)
            }
            const versions = await gemResponse.json()
            if (versions.some((version) => version.number === process.env.GEM_VERSION)) {
              throw new Error(`RubyGems ${process.env.GEM_NAME} ${process.env.GEM_VERSION} is already present`)
            }
          }
          NODE
      - name: Require the source tag and GitHub release to be unused
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Git tag $RELEASE_TAG already exists" >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "GitHub release $RELEASE_TAG already exists" >&2
            exit 1
          fi
      - name: Configure RubyGems trusted-publisher credentials
        uses: rubygems/configure-rubygems-credentials@dc5a8d8553e6ee01fc26761a49e99e733d17954a # v2.1.0
      - name: Publish the exact frozen npm and RubyGems bytes
        shell: bash
        run: |
          set -euo pipefail
          npm publish "$NPM_ARTIFACT" --access public
          gem push "$GEM_ARTIFACT"
      - name: Verify registry downloads match the frozen checksums
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          import { createHash } from "node:crypto"
          import { readFileSync } from "node:fs"

          const expectedChecksums = new Map(
            readFileSync("release-candidate/SHA256SUMS", "utf8")
              .trim()
              .split("\n")
              .map((line) => line.split(/  +/))
              .map(([sha256, file]) => [file, sha256]),
          )
          const checksum = (body) => createHash("sha256").update(body).digest("hex")
          const eventually = async (url) => {
            let response
            for (let attempt = 0; attempt < 10; attempt += 1) {
              response = await fetch(url)
              if (response.ok) return response
              await new Promise((resolve) => setTimeout(resolve, 2000))
            }
            throw new Error(`Published artifact was unavailable: ${response?.status ?? "network"}`)
          }
          const metadata = await eventually(
            `https://registry.npmjs.org/${encodeURIComponent(process.env.NPM_NAME)}/${encodeURIComponent(process.env.PACKAGE_VERSION)}`,
          )
          const npm = await metadata.json()
          const npmTarball = await eventually(npm.dist?.tarball)
          const npmExpected = expectedChecksums.get(`artifacts/npm-tarball/${process.env.NPM_NAME}-${process.env.PACKAGE_VERSION}.tgz`)
          if (checksum(Buffer.from(await npmTarball.arrayBuffer())) !== npmExpected) {
            throw new Error("Published npm tarball does not match the frozen candidate")
          }
          const gem = await eventually(
            `https://rubygems.org/downloads/${process.env.GEM_NAME}-${process.env.GEM_VERSION}.gem`,
          )
          const gemExpected = expectedChecksums.get(`artifacts/ruby-gem/${process.env.GEM_NAME}-${process.env.GEM_VERSION}.gem`)
          if (checksum(Buffer.from(await gem.arrayBuffer())) !== gemExpected) {
            throw new Error("Published RubyGems artifact does not match the frozen candidate")
          }
          NODE
      - name: Create the immutable source tag and GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" \
            "$NPM_ARTIFACT" \
            "$GEM_ARTIFACT" \
            release-candidate/release-candidate.json \
            release-candidate/SHA256SUMS \
            release-candidate/provenance.jsonl \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Expo Turbo $PACKAGE_VERSION" \
            --notes "Stable publication of the frozen candidate from workflow run ${{ inputs.candidate_run_id }}."

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check

  ruby:
    name: Ruby gem (${{ matrix.turbo_rails }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - turbo_rails: 2.0.10
            gemfile: turbo_rails_2.0.10.gemfile
          - turbo_rails: 2.0.23
            gemfile: turbo_rails_2.0.23.gemfile
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/rails/gemfiles/${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: true
      - run: bundle exec ruby -e 'abort unless Gem.loaded_specs.fetch("turbo-rails").version.to_s == "${{ matrix.turbo_rails }}"'
        working-directory: rails
      - run: bundle exec ruby "$(bundle show rake)/exe/rake"
        working-directory: rails
      - run: bundle exec ruby "$(bundle show rake)/exe/rake" build
        working-directory: rails

  expo-example:
    name: Expo example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun install --frozen-lockfile
        working-directory: example/expo
      - run: bun run check
        working-directory: example/expo
      - run: bunx expo-doctor
        working-directory: example/expo

  rails-example:
    name: Rails example
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/example/rails/Gemfile
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: true
      - run: bundle exec standardrb
        working-directory: example/rails
      - run: bundle exec rspec
        working-directory: example/rails

  rails-action-cable-smoke:
    name: Rails Action Cable desktop smoke
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/example/rails/Gemfile
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: true
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun install --frozen-lockfile
        working-directory: example/expo
      - name: Smoke Rails Action Cable WebSocket
        working-directory: example/rails
        run: |
          set -eu
          log_file="$(mktemp)"
          PORT=3001 RAILS_ENV=development bundle exec rails server -b 127.0.0.1 >"$log_file" 2>&1 &
          rails_pid=$!

          cleanup() {
            exit_status=$?
            trap - EXIT
            kill "$rails_pid" 2>/dev/null || true
            wait "$rails_pid" 2>/dev/null || true
            if [ "$exit_status" -ne 0 ]; then cat "$log_file"; fi
            exit "$exit_status"
          }
          trap cleanup EXIT

          for _ in $(seq 1 30); do
            if curl --fail --silent --show-error --max-time 1 http://127.0.0.1:3001/up >/dev/null 2>&1; then
              (
                cd ../expo
                EXPO_TURBO_DEMO_ORIGIN=http://127.0.0.1:3001 bun test src/demo-live-cable.redis-smoke.test.ts
              )
              exit $?
            fi
            if ! kill -0 "$rails_pid" 2>/dev/null; then
              echo "Rails exited before readiness"
              exit 1
            fi
            sleep 1
          done

          echo "Rails did not become ready"
          exit 1

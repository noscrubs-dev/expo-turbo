name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typescript:
    name: TypeScript package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check

  ruby:
    name: Ruby gem (${{ matrix.turbo_rails }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - turbo_rails: 2.0.10
            gemfile: turbo_rails_2.0.10.gemfile
          - turbo_rails: 2.0.23
            gemfile: turbo_rails_2.0.23.gemfile
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/rails/gemfiles/${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: true
      - run: bundle exec ruby -e 'abort unless Gem.loaded_specs.fetch("turbo-rails").version.to_s == "${{ matrix.turbo_rails }}"'
        working-directory: rails
      - run: bundle exec ruby "$(bundle show rake)/exe/rake"
        working-directory: rails
      - run: bundle exec ruby "$(bundle show rake)/exe/rake" build
        working-directory: rails

  expo-example:
    name: Expo example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun install --frozen-lockfile
        working-directory: example/expo
      - run: bun run check
        working-directory: example/expo
      - run: bunx expo-doctor
        working-directory: example/expo

  rails-example:
    name: Rails example
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/example/rails/Gemfile
      REDIS_URL: redis://localhost:6379/15
    steps:
      - uses: actions/checkout@v5
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.8"
          bundler-cache: true
      - run: bundle exec standardrb
        working-directory: example/rails
      - run: bundle exec rspec
        working-directory: example/rails
